name: Test and syntax check
on:
  push:
  pull_request:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run tests
        shell: bash
        run: |
          set +e
          npm test > test-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 35 test-output.log
            exit "$status"
          fi
          cat test-output.log
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
      - name: Check JavaScript syntax
        run: npm run check
      - name: Build standalone HTML calculators
        run: npm run build:standalone
      - name: Upload standalone HTML calculators
        uses: actions/upload-artifact@v4
        with:
          name: standalone-html
          path: standalone/*.html
      - name: Materialize v0.19 release files
        if: (github.event_name == 'push' && github.ref != 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        run: |
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git fetch origin "$BRANCH"
          git checkout -B "$BRANCH" "origin/$BRANCH"
          npm run build:standalone
          node scripts/finalize-v019.mjs
          if [ -z "$(git status --porcelain)" ]; then
            echo "Standalone release files are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html tests/app-smoke.test.mjs README.md docs standalone
          git commit -m "build: materialize v0.19 standalone calculators"
          git push origin HEAD:"$BRANCH"
