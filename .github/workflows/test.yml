name: Release quality gate
on:
  push:
  pull_request:
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply v0.23 release integration
        run: node scripts/finalize-v023.mjs
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run unit and integration tests
        shell: bash
        run: |
          set +e
          npm test > test-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 100 test-output.log
            exit "$status"
          fi
          cat test-output.log
      - name: Check JavaScript modules
        run: npm run check
      - name: Build production site
        run: npm run build:production
      - name: Run Chromium E2E and accessibility tests
        shell: bash
        run: |
          set +e
          npm run test:e2e > e2e-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 140 e2e-output.log
            exit "$status"
          fi
          cat e2e-output.log
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            test-output.log
            e2e-output.log
      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
      - name: Upload production site
        uses: actions/upload-artifact@v4
        with:
          name: production-site
          path: dist/
      - name: Materialize v0.23 release files
        if: (github.event_name == 'push' && github.ref != 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "v0.23 release files are already current."
            exit 0
          fi
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: materialize v0.23 release quality files"
          git push origin HEAD:"$BRANCH"
