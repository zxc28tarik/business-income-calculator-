name: Release quality gate
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run unit and integration tests
        shell: bash
        run: |
          set +e
          npm test > test-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 100 test-output.log
            exit "$status"
          fi
          cat test-output.log
      - name: Check JavaScript modules
        run: npm run check
      - name: Build production site
        run: npm run build:production
      - name: Run Chromium E2E and accessibility tests against dist
        shell: bash
        env:
          BIC_E2E_ROOT: dist
        run: |
          set +e
          npm run test:e2e > e2e-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 160 e2e-output.log
            exit "$status"
          fi
          cat e2e-output.log
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            test-output.log
            e2e-output.log
      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
      - name: Upload production site
        uses: actions/upload-artifact@v4
        with:
          name: production-site
          path: dist/
