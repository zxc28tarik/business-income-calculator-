name: Test and syntax check
on:
  push:
  pull_request:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply v0.20 report integration
        run: node scripts/finalize-v020.mjs
      - name: Apply v0.21 actual tracking integration
        shell: bash
        run: |
          set +e
          node scripts/finalize-v021.mjs > v021-integration.log 2>&1
          status=$?
          cat v021-integration.log
          exit "$status"
      - name: Apply v0.21 tracking compatibility fix
        run: node scripts/fix-v021-tracking.mjs
      - name: Apply zero variance classification fix
        run: node scripts/fix-v021-zero-variance.mjs
      - name: Upload v0.21 integration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v021-integration-log
          path: v021-integration.log
      - name: Run tests
        shell: bash
        run: |
          set +e
          npm test > test-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 55 test-output.log
            exit "$status"
          fi
          cat test-output.log
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
      - name: Check JavaScript syntax
        run: npm run check
      - name: Build standalone HTML calculators
        run: npm run build:standalone
      - name: Upload standalone HTML calculators
        uses: actions/upload-artifact@v4
        with:
          name: standalone-html
          path: standalone/*.html
      - name: Materialize v0.21 actual tracking mode
        if: (github.event_name == 'push' && github.ref != 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "v0.21 tracking files are already current."
            exit 0
          fi
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: materialize v0.21 actual tracking mode"
          git push origin HEAD:"$BRANCH"
